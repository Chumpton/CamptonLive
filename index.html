<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campton's World</title>
    <meta name="description" content="Digital profile and links for Campton's World. Quantum spirituality, the evolution of consciousness, metaphysics, and shamanic wisdom.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Background Canvas for Stars -->
    <canvas id="starsCanvas"></canvas>
    
    <!-- Aurora Borealis Elements -->
    <div class="aurora-container">
        <div class="aurora aurora-1"></div>
        <div class="aurora aurora-2"></div>
        <div class="aurora aurora-3"></div>
    </div>

    <!-- Earth/Nature Silhouette at the bottom -->
    <div class="nature-silhouette"></div>

    <main class="content-wrapper">
        <!-- Profile Section -->
        <header class="profile-card">
            <div class="profile-glow"></div>
            <div class="profile-square-container">
                <img src="profile_small.jpg" alt="Campton Wilkins" class="profile-square-image">
            </div>
            
            <h1 class="profile-name">Campton Wilkins</h1>
            <a href="https://www.instagram.com/camptons.world/" target="_blank" rel="noopener noreferrer" class="profile-handle">@camptons.world</a>
            
            <div class="social-icons">
                <a href="https://tiktok.com/@camptons.world" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="TikTok">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
                </a>
                <a href="https://youtube.com/c/CamptonWilkins" target="_blank" rel="noopener noreferrer" class="social-icon" aria-label="YouTube">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
                </a>
            </div>
            
            <div class="profile-stats">
                <div class="stat-item">
                    <span class="stat-value">87K</span>
                    <span class="stat-label">Followers</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value">378</span>
                    <span class="stat-label">Following</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value">88</span>
                    <span class="stat-label">Posts</span>
                </div>
            </div>
        </header>

        <!-- Link Tree Section -->
        <nav class="link-tree">
            <!-- Dimension Viewer Widget -->
            <div class="widget-preview-container" id="dimensionWidgetContainer" style="--delay: 0.1s">
                <div class="widget-preview-header" onclick="toggleWidgetFullscreen()">
                    <div class="link-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
                    </div>
                    <span class="link-text">Dimension Viewer</span>
                    <button id="expandWidgetBtn" class="expand-btn" aria-label="Expand">
                        <svg class="expand-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
                        <svg class="collapse-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="widget-iframe-wrapper">
                    <iframe id="dimensionIframe" src="dimension-viewer/index.html" frameborder="0"></iframe>
                    <div class="widget-overlay" id="widgetOverlay" onclick="toggleWidgetFullscreen()">
                        <span class="overlay-text">Click to Interact Full Screen</span>
                    </div>
                </div>
            </div>

            <!-- Microstead Link -->
            <a href="https://microstead.org/" target="_blank" rel="noopener noreferrer" class="tree-link microstead-link" style="--delay: 0.2s">
                <div class="link-banner">
                    <img src="microstead.jpg" alt="Microstead">
                </div>
                <div class="link-inner">
                    <div class="link-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <div class="link-content">
                        <span class="link-text" style="flex: unset;">Founder of The Microstead Method</span>
                        <span class="link-excerpt">Building sovereign, regenerative communities aligned with natural law.</span>
                    </div>
                    <div class="link-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </div>
                </div>
            </a>

            <!-- Link Template 2 -->
            <a href="library.html" class="tree-link library-link" style="--delay: 0.3s">
                <div class="link-banner">
                    <img src="library-thumb.gif" alt="My Library">
                </div>
                <div class="link-inner">
                    <div class="link-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                        </svg>
                    </div>
                    <span class="link-text">My Library</span>
                    <div class="link-arrow">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </div>
                </div>
            </a>
        </nav>
        
        <footer class="footer">
            <p>&copy; <script>document.write(new Date().getFullYear())</script> Campton's World. The Living Cosmos.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
